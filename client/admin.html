<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/svg+xml" href="img/icon.svg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration - Metis Genie Platform v5.5.11</title>
    <link rel="stylesheet" href="css/main.css?v=5.5.11">
    <style>
        .admin-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(360px,1fr));gap:1.25rem;padding:1.5rem}
        .ad-card{background:var(--card-bg,#fff);border:1px solid var(--border,#e2e8f0);border-radius:12px;overflow:hidden}
        .ad-card .card-head{display:flex;justify-content:space-between;align-items:center;padding:1rem 1.25rem;border-bottom:1px solid var(--border,#e2e8f0)}
        .ad-card .card-head h3{margin:0;font-size:.95rem;font-weight:600}
        .ad-card .card-body{padding:1.25rem}
        .metric-row{display:flex;justify-content:space-between;align-items:center;padding:.5rem 0;border-bottom:1px solid var(--border-light,#f1f5f9)}
        .metric-row:last-child{border-bottom:none}
        .metric-label{font-size:.85rem;color:var(--text-muted,#64748b)}
        .metric-value{font-size:.95rem;font-weight:600;font-variant-numeric:tabular-nums}
        .positive{color:#16a34a}.negative{color:#dc2626}.neutral{color:#2563eb}
        .page-header{padding:1.5rem 1.5rem 0;display:flex;justify-content:space-between;align-items:center}
        .page-header h2{margin:0;font-size:1.4rem;font-weight:700}
        .badge-tag{display:inline-block;padding:2px 10px;border-radius:12px;font-size:.75rem;font-weight:600}
        .badge-tag.pass{background:#dcfce7;color:#166534}
        .back-link{display:inline-flex;align-items:center;gap:.375rem;color:var(--text-muted,#64748b);text-decoration:none;font-size:.85rem;padding:.5rem 0}
        .back-link:hover{color:var(--primary,#2563eb)}
        .back-link svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2}
        .btn-sm{padding:4px 12px;border:1px solid var(--border,#e2e8f0);border-radius:6px;background:var(--card-bg,#fff);cursor:pointer;font-size:.8rem}
        .btn-sm:hover{background:var(--primary,#2563eb);color:#fff;border-color:var(--primary,#2563eb)}
        .user-table{width:100%;border-collapse:collapse;font-size:.85rem}
        .user-table th,.user-table td{padding:.5rem .75rem;text-align:left;border-bottom:1px solid var(--border-light,#f1f5f9)}
        .user-table th{color:var(--text-muted,#64748b);font-weight:500;font-size:.8rem}
        .role-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.7rem;font-weight:600}
        .role-badge.admin{background:#fee2e2;color:#991b1b}.role-badge.manager{background:#fef3c7;color:#92400e}.role-badge.trader{background:#dbeafe;color:#1e40af}.role-badge.viewer{background:#f1f5f9;color:#475569}
        .create-form{display:grid;gap:.5rem}
        .create-form input,.create-form select{padding:6px 10px;border:1px solid var(--border,#e2e8f0);border-radius:6px;font-size:.85rem}
    </style>
</head>
<body>
    <div class="page-header">
        <div>
            <a href="index.html" class="back-link"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>Back to Dashboard</a>
            <h2>Administration</h2>
        </div>
        <span class="badge-tag pass" id="statusBadge">Loading...</span>
    </div>
    <div class="admin-grid" id="adminGrid">
        <div class="ad-card"><div class="card-head"><h3>User Management</h3><button class="btn-sm" onclick="refreshUsers()">Refresh</button></div><div class="card-body" id="userManagement"><span class="metric-label">Loading...</span></div></div>
        <div class="ad-card"><div class="card-head"><h3>Create User</h3></div><div class="card-body" id="createUser">
            <div class="create-form">
                <input type="text" id="newUsername" placeholder="Username">
                <input type="email" id="newEmail" placeholder="Email">
                <input type="password" id="newPassword" placeholder="Password">
                <input type="text" id="newDisplayName" placeholder="Display Name">
                <select id="newRole"><option value="Viewer">Viewer</option><option value="Trader">Trader</option><option value="Manager">Manager</option><option value="Admin">Admin</option></select>
                <button class="btn-sm" onclick="createUser()">Create User</button>
            </div>
        </div></div>
        <div class="ad-card"><div class="card-head"><h3>System Statistics</h3></div><div class="card-body" id="sysStats"><span class="metric-label">Loading...</span></div></div>
        <div class="ad-card"><div class="card-head"><h3>Active Sessions</h3></div><div class="card-body" id="activeSessions"><span class="metric-label">Loading...</span></div></div>
        <div class="ad-card"><div class="card-head"><h3>Configuration Validation</h3><button class="btn-sm" onclick="validateConfig()">Validate</button></div><div class="card-body" id="configValidation"><span class="metric-label">Ready</span></div></div>
        <div class="ad-card"><div class="card-head"><h3>Multi-Tenant</h3></div><div class="card-body" id="multiTenant"><span class="metric-label">Loading...</span></div></div>
    </div>
    <script src="js/utils.js?v=5.5.11"></script>
    <script src="js/config.js?v=5.5.11"></script>
    <script src="js/connection.js?v=5.5.11"></script>
    <script>
    (function() {
        const token = sessionStorage.getItem('genie_token');
        const _sv = localStorage.getItem('mg_serverUrl');
        const base = (_sv ? JSON.parse(_sv) : 'http://localhost:8080') + '/api/v1';
        const hdr = { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };

        async function loadAdmin() {
            try {
                const [uRes, sRes, tRes] = await Promise.all([
                    fetch(base + '/admin/users', { headers: hdr }),
                    fetch(base + '/security/sessions', { headers: hdr }),
                    fetch(base + '/tenants', { headers: hdr })
                ]);
                const users = await uRes.json();
                const sessions = await sRes.json();
                const tenants = await tRes.json();
                renderUsers(users);
                renderSessions(sessions);
                renderTenants(tenants);
                document.getElementById('statusBadge').textContent = 'Connected';
            } catch(e) {
                document.getElementById('statusBadge').textContent = 'Demo Mode';
                renderDemo();
            }
        }

        function renderUsers(data) {
            const users = data.users || [];
            if (!users.length) { renderDemo(); return; }
            let html = '<table class="user-table"><thead><tr><th>Username</th><th>Role</th><th>Status</th><th>Last Login</th></tr></thead><tbody>';
            users.forEach(u => {
                const cls = (u.role||'viewer').toLowerCase();
                html += '<tr><td><strong>' + u.username + '</strong></td><td><span class="role-badge ' + cls + '">' + (u.role||'Viewer') + '</span></td><td class="positive">' + (u.status||'Active') + '</td><td>' + (u.last_login||'Never') + '</td></tr>';
            });
            html += '</tbody></table>';
            document.getElementById('userManagement').innerHTML = html;
        }

        function renderSessions(data) {
            const sessions = data.sessions || [];
            let html = '<div class="metric-row"><span class="metric-label">Active Sessions</span><span class="metric-value neutral">' + (sessions.length || 3) + '</span></div>';
            (sessions.length ? sessions : [{ user: 'admin', ip: '127.0.0.1', started: '22:00 UTC' }]).forEach(s => {
                html += '<div class="metric-row"><span class="metric-label">' + (s.user||s.username) + ' (' + (s.ip||'local') + ')</span><span class="metric-value">' + (s.started||s.created||'Active') + '</span></div>';
            });
            document.getElementById('activeSessions').innerHTML = html;
        }

        function renderTenants(data) {
            const tenants = data.tenants || [];
            document.getElementById('multiTenant').innerHTML =
                '<div class="metric-row"><span class="metric-label">Active Tenants</span><span class="metric-value neutral">' + (tenants.length || 1) + '</span></div>' +
                '<div class="metric-row"><span class="metric-label">Default Tenant</span><span class="metric-value">default</span></div>' +
                '<div class="metric-row"><span class="metric-label">Isolation</span><span class="metric-value positive">Enabled</span></div>';
        }

        function renderDemo() {
            document.getElementById('userManagement').innerHTML = '<table class="user-table"><thead><tr><th>Username</th><th>Role</th><th>Status</th><th>Last Login</th></tr></thead><tbody><tr><td><strong>admin</strong></td><td><span class="role-badge admin">Admin</span></td><td class="positive">Active</td><td>2 min ago</td></tr><tr><td><strong>jdoe</strong></td><td><span class="role-badge manager">Manager</span></td><td class="positive">Active</td><td>1 hr ago</td></tr><tr><td><strong>tsmith</strong></td><td><span class="role-badge trader">Trader</span></td><td class="positive">Active</td><td>3 hr ago</td></tr><tr><td><strong>viewer1</strong></td><td><span class="role-badge viewer">Viewer</span></td><td>Inactive</td><td>2 days ago</td></tr></tbody></table>';
            document.getElementById('sysStats').innerHTML = '<div class="metric-row"><span class="metric-label">Total Users</span><span class="metric-value">4</span></div><div class="metric-row"><span class="metric-label">Active Sessions</span><span class="metric-value neutral">3</span></div><div class="metric-row"><span class="metric-label">API Calls Today</span><span class="metric-value">1,247</span></div><div class="metric-row"><span class="metric-label">Uptime</span><span class="metric-value positive">99.98%</span></div>';
            renderSessions({});
            renderTenants({});
            document.getElementById('configValidation').innerHTML = '<span class="metric-label">Ready to validate</span>';
        }

        window.refreshUsers = loadAdmin;
        window.createUser = function() {
            const username = document.getElementById('newUsername').value;
            if (!username) return;
            const body = { username, email: document.getElementById('newEmail').value, password: document.getElementById('newPassword').value, display_name: document.getElementById('newDisplayName').value, role: document.getElementById('newRole').value };
            fetch(base + '/auth/register', { method: 'POST', headers: hdr, body: JSON.stringify(body) }).then(() => loadAdmin()).catch(() => {});
        };
        window.validateConfig = function() {
            fetch(base + '/config/validate', { headers: hdr }).then(r => r.json()).then(d => {
                document.getElementById('configValidation').innerHTML = '<div class="metric-row"><span class="metric-label">Status</span><span class="metric-value positive">' + (d.valid ? 'Valid' : 'Issues Found') + '</span></div><div class="metric-row"><span class="metric-label">Checks Passed</span><span class="metric-value">' + (d.checks_passed||12) + '</span></div><div class="metric-row"><span class="metric-label">Warnings</span><span class="metric-value">' + (d.warnings||0) + '</span></div>';
            }).catch(() => {
                document.getElementById('configValidation').innerHTML = '<div class="metric-row"><span class="metric-label">Status</span><span class="metric-value positive">Valid (demo)</span></div><div class="metric-row"><span class="metric-label">Checks Passed</span><span class="metric-value">12 / 12</span></div>';
            });
        };

        loadAdmin();
    })();
    </script>
    <script>
    /* API endpoint wiring - auto-generated */
    (function(){
        const base = (typeof CONFIG !== 'undefined' && CONFIG.API_BASE) ? CONFIG.API_BASE : 'http://localhost:8080';
        const token = sessionStorage.getItem('genie_token') || localStorage.getItem('genie_token') || '';
        const headers = token ? {'Authorization':'Bearer '+token} : {};
        window.genieAPI = window.genieAPI || {};
        window.genieAPI.users_me = function() {
            return fetch(base+'/api/v1/users/me', {headers:headers}).then(r=>r.json());
        };
        window.genieAPI.users_me_password = function() {
            return fetch(base+'/api/v1/users/me/password', {headers:headers}).then(r=>r.json());
        };
    })();
    </script>
</body>
</html>
