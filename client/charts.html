<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <link rel="icon" type="image/svg+xml" href="img/icon.svg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a1a2e">
    <title>Metis Genie Platform v5.5.11 - Charts</title>
    <link rel="stylesheet" href="css/main.css?v=5.5.11">
    <link rel="stylesheet" href="css/trading.css?v=5.5.11">
</head>
<body data-theme="light">

<nav class="top-nav">
    <div class="top-nav-left">
        <a href="index.html" class="top-nav-brand">
            <img class="brand-icon-sm" src="img/icon.svg" alt="Metis Genie Platform">
            Metis Genie Platform
        </a>
        <span class="top-nav-sep">|</span>
        <span class="top-nav-page">Interactive Charts</span>
    </div>
    <div class="top-nav-right">
        <a href="index.html" class="btn btn-sm btn-secondary">Dashboard</a>
        <a href="trading.html" class="btn btn-sm btn-secondary">Trading</a>
    </div>
</nav>

<div class="charts-layout">
    <!-- Symbol Selection Bar -->
    <div class="chart-select-bar">
        <div class="chart-symbols">
            <input type="text" id="chartSearchInput" class="search-input" placeholder="Search symbol...">
            <div class="symbol-pills" id="symbolPills">
                <button class="sym-pill active" data-sym="SPY">SPY</button>
                <button class="sym-pill" data-sym="QQQ">QQQ</button>
                <button class="sym-pill" data-sym="AAPL">AAPL</button>
                <button class="sym-pill" data-sym="MSFT">MSFT</button>
                <button class="sym-pill" data-sym="GOOGL">GOOGL</button>
                <button class="sym-pill" data-sym="AMZN">AMZN</button>
                <button class="sym-pill" data-sym="NVDA">NVDA</button>
                <button class="sym-pill" data-sym="TSLA">TSLA</button>
            </div>
        </div>
        <div class="chart-tools">
            <select id="chartInterval" class="sel">
                <option value="1m">1 Min</option>
                <option value="5m">5 Min</option>
                <option value="15m">15 Min</option>
                <option value="1h">1 Hour</option>
                <option value="1d" selected>Daily</option>
                <option value="1w">Weekly</option>
                <option value="1M">Monthly</option>
            </select>
            <button class="btn btn-sm btn-secondary" id="compareBtn">+ Compare</button>
            <button class="btn btn-sm btn-secondary" id="fullscreenBtn">Fullscreen</button>
        </div>
    </div>

    <!-- Main Chart Area -->
    <div class="full-chart-area">
        <div class="chart-info-overlay" id="chartInfoOverlay">
            <div class="cio-symbol" id="cioSymbol">SPY</div>
            <div class="cio-name" id="cioName">SPDR S&P 500 ETF Trust</div>
            <div class="cio-ohlcv">
                <span>O: <b id="cioOpen">597.20</b></span>
                <span>H: <b id="cioHigh">599.85</b></span>
                <span>L: <b id="cioLow">595.10</b></span>
                <span>C: <b id="cioClose">598.42</b></span>
                <span>V: <b id="cioVol">82.3M</b></span>
            </div>
        </div>
        <!-- Drawing Tools -->
        <div class="drawing-tools" id="drawingTools">
            <button class="draw-btn" data-tool="cursor" title="Cursor"><svg viewBox="0 0 24 24" width="16"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/></svg></button>
            <button class="draw-btn" data-tool="line" title="Trend Line"><svg viewBox="0 0 24 24" width="16"><line x1="4" y1="20" x2="20" y2="4" stroke="currentColor" stroke-width="2"/></svg></button>
            <button class="draw-btn" data-tool="hline" title="Horizontal Line"><svg viewBox="0 0 24 24" width="16"><line x1="2" y1="12" x2="22" y2="12" stroke="currentColor" stroke-width="2"/></svg></button>
            <button class="draw-btn" data-tool="rect" title="Rectangle"><svg viewBox="0 0 24 24" width="16"><rect x="3" y="5" width="18" height="14" stroke="currentColor" stroke-width="2" fill="none"/></svg></button>
            <button class="draw-btn" data-tool="fib" title="Fibonacci"><svg viewBox="0 0 24 24" width="16"><path d="M2 6h20M2 10h20M2 14h20M2 18h20" stroke="currentColor" stroke-width="1" opacity="0.7"/></svg></button>
            <button class="draw-btn" data-tool="text" title="Text Annotation"><svg viewBox="0 0 24 24" width="16"><text x="6" y="18" font-size="16" fill="currentColor">T</text></svg></button>
            <div class="draw-sep"></div>
            <button class="draw-btn" data-tool="undo" title="Undo"><svg viewBox="0 0 24 24" width="16"><path d="M3 10h10a5 5 0 015 5v0a5 5 0 01-5 5H12" fill="none" stroke="currentColor" stroke-width="2"/><path d="M7 6L3 10l4 4" fill="none" stroke="currentColor" stroke-width="2"/></svg></button>
            <button class="draw-btn" data-tool="clear" title="Clear All"><svg viewBox="0 0 24 24" width="16"><path d="M3 6h18M8 6V4h8v2M5 6v14a2 2 0 002 2h10a2 2 0 002-2V6" fill="none" stroke="currentColor" stroke-width="2"/></svg></button>
        </div>
        <canvas id="fullChart"></canvas>
    </div>

    <!-- Indicator Sub-panels -->
    <div class="sub-panels" id="subPanels">
        <div class="sub-panel" id="volumePanel">
            <div class="sp-header"><span>Volume</span><button class="sp-close" data-panel="volume">x</button></div>
            <canvas id="volCanvas"></canvas>
        </div>
        <div class="sub-panel" id="rsiPanel">
            <div class="sp-header"><span>RSI (14)</span><button class="sp-close" data-panel="rsi">x</button></div>
            <canvas id="rsiCanvas"></canvas>
        </div>
        <div class="sub-panel" id="macdPanel" style="display:none">
            <div class="sp-header"><span>MACD (12,26,9)</span><button class="sp-close" data-panel="macd">x</button></div>
            <canvas id="macdCanvas"></canvas>
        </div>
    </div>

    <!-- Bottom: Indicator Selection -->
    <div class="indicator-bar">
        <span class="ib-label">Overlays:</span>
        <button class="ib-btn active" data-overlay="sma20">SMA(20)</button>
        <button class="ib-btn active" data-overlay="sma50">SMA(50)</button>
        <button class="ib-btn" data-overlay="sma200">SMA(200)</button>
        <button class="ib-btn" data-overlay="ema12">EMA(12)</button>
        <button class="ib-btn" data-overlay="ema26">EMA(26)</button>
        <button class="ib-btn active" data-overlay="bb">Bollinger Bands</button>
        <button class="ib-btn" data-overlay="ichimoku">Ichimoku</button>
        <span class="ib-sep">|</span>
        <span class="ib-label">Studies:</span>
        <button class="ib-btn active" data-study="volume">Volume</button>
        <button class="ib-btn active" data-study="rsi">RSI</button>
        <button class="ib-btn" data-study="macd">MACD</button>
        <button class="ib-btn" data-study="stoch">Stochastic</button>
        <button class="ib-btn" data-study="atr">ATR</button>
        <button class="ib-btn" data-study="obv">OBV</button>
    </div>
</div>

<script src="js/config.js?v=5.5.11"></script>
<script src="js/utils.js?v=5.5.11"></script>
<script src="js/connection.js?v=5.5.11"></script>
<script src="js/interactive-charts.js?v=5.5.11"></script>
    <script>
    /* API endpoint wiring - auto-generated */
    (function(){
        const base = (typeof CONFIG !== 'undefined' && CONFIG.API_BASE) ? CONFIG.API_BASE : 'http://localhost:8080';
        const token = sessionStorage.getItem('genie_token') || localStorage.getItem('genie_token') || '';
        const headers = token ? {'Authorization':'Bearer '+token} : {};
        window.genieAPI = window.genieAPI || {};
        window.genieAPI.analytics = function() {
            return fetch(base+'/api/v1/analytics', {headers:headers}).then(r=>r.json());
        };
        window.genieAPI.market = function() {
            return fetch(base+'/api/v1/market', {headers:headers}).then(r=>r.json());
        };
    })();
    </script>
</body>
</html>
