<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/svg+xml" href="img/icon.svg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Export - Metis Genie Platform v5.5.11</title>
    <link rel="stylesheet" href="css/main.css?v=5.5.11">
    <style>
        .export-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(360px,1fr));gap:1.25rem;padding:1.5rem}
        .ex-card{background:var(--card-bg,#fff);border:1px solid var(--border,#e2e8f0);border-radius:12px;overflow:hidden}
        .ex-card .card-head{display:flex;justify-content:space-between;align-items:center;padding:1rem 1.25rem;border-bottom:1px solid var(--border,#e2e8f0)}
        .ex-card .card-head h3{margin:0;font-size:.95rem;font-weight:600}
        .ex-card .card-body{padding:1.25rem}
        .metric-row{display:flex;justify-content:space-between;align-items:center;padding:.5rem 0;border-bottom:1px solid var(--border-light,#f1f5f9)}
        .metric-row:last-child{border-bottom:none}
        .metric-label{font-size:.85rem;color:var(--text-muted,#64748b)}
        .metric-value{font-size:.95rem;font-weight:600;font-variant-numeric:tabular-nums}
        .positive{color:#16a34a}.neutral{color:#2563eb}
        .page-header{padding:1.5rem 1.5rem 0;display:flex;justify-content:space-between;align-items:center}
        .page-header h2{margin:0;font-size:1.4rem;font-weight:700}
        .badge-tag{display:inline-block;padding:2px 10px;border-radius:12px;font-size:.75rem;font-weight:600}
        .badge-tag.pass{background:#dcfce7;color:#166534}
        .back-link{display:inline-flex;align-items:center;gap:.375rem;color:var(--text-muted,#64748b);text-decoration:none;font-size:.85rem;padding:.5rem 0}
        .back-link:hover{color:var(--primary,#2563eb)}
        .back-link svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2}
        .btn-sm{padding:4px 12px;border:1px solid var(--border,#e2e8f0);border-radius:6px;background:var(--card-bg,#fff);cursor:pointer;font-size:.8rem}
        .btn-sm:hover{background:var(--primary,#2563eb);color:#fff;border-color:var(--primary,#2563eb)}
        .btn-primary{padding:8px 16px;background:var(--primary,#2563eb);color:#fff;border:none;border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer}
        .btn-primary:hover{background:#1d4ed8}
        .export-form{display:grid;gap:.75rem}
        .export-form select,.export-form input{padding:8px 10px;border:1px solid var(--border,#e2e8f0);border-radius:6px;font-size:.85rem}
        .export-form label{font-size:.85rem;font-weight:500;color:var(--text,#1a202c)}
        .format-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem}
        .format-opt{padding:.75rem;border:2px solid var(--border,#e2e8f0);border-radius:8px;text-align:center;cursor:pointer;transition:all .2s}
        .format-opt:hover,.format-opt.selected{border-color:var(--primary,#2563eb);background:#eff6ff}
        .format-opt .icon{font-size:1.5rem;margin-bottom:.25rem}
        .format-opt .label{font-size:.8rem;font-weight:600}
        .export-table{width:100%;border-collapse:collapse;font-size:.85rem}
        .export-table th,.export-table td{padding:.5rem .75rem;text-align:left;border-bottom:1px solid var(--border-light,#f1f5f9)}
        .export-table th{color:var(--text-muted,#64748b);font-weight:500;font-size:.8rem}
    </style>
</head>
<body>
    <div class="page-header">
        <div>
            <a href="index.html" class="back-link"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>Back to Dashboard</a>
            <h2>Data Export</h2>
        </div>
        <span class="badge-tag pass" id="statusBadge">Export Ready</span>
    </div>
    <div class="export-grid" id="exportGrid">
        <div class="ex-card"><div class="card-head"><h3>Export Data</h3></div><div class="card-body">
            <div class="export-form">
                <label>Data Source</label>
                <select id="exportSource">
                    <option value="positions">Positions</option>
                    <option value="orders">Orders &amp; Transactions</option>
                    <option value="portfolio">Portfolio Summary</option>
                    <option value="risk">Risk Metrics</option>
                    <option value="analytics">Analytics Data</option>
                    <option value="compliance">Compliance Reports</option>
                    <option value="tax">Tax Records</option>
                    <option value="audit">Audit Log</option>
                </select>
                <label>Format</label>
                <div class="format-grid" id="formatGrid">
                    <div class="format-opt selected" onclick="selectFormat(this,'csv')"><div class="icon">&#128196;</div><div class="label">CSV</div></div>
                    <div class="format-opt" onclick="selectFormat(this,'json')"><div class="icon">&#123;&#125;</div><div class="label">JSON</div></div>
                    <div class="format-opt" onclick="selectFormat(this,'pdf')"><div class="icon">&#128203;</div><div class="label">PDF</div></div>
                </div>
                <label>Date Range</label>
                <div style="display:flex;gap:.5rem">
                    <input type="date" id="exportFrom" value="2026-01-01">
                    <input type="date" id="exportTo" value="2026-02-06">
                </div>
                <button class="btn-primary" onclick="runExport()">Export Data</button>
            </div>
        </div></div>
        <div class="ex-card"><div class="card-head"><h3>Available Formats</h3></div><div class="card-body" id="availFormats"><span class="metric-label">Loading...</span></div></div>
        <div class="ex-card"><div class="card-head"><h3>CSV Templates</h3></div><div class="card-body" id="csvTemplates"><span class="metric-label">Loading...</span></div></div>
        <div class="ex-card"><div class="card-head"><h3>Export History</h3></div><div class="card-body" id="exportHistory"><span class="metric-label">Loading...</span></div></div>
        <div class="ex-card"><div class="card-head"><h3>Scheduled Exports</h3></div><div class="card-body" id="scheduledExports"><span class="metric-label">Loading...</span></div></div>
        <div class="ex-card"><div class="card-head"><h3>Export Status</h3></div><div class="card-body" id="exportStatus"><span class="metric-label">Ready</span></div></div>
    </div>
    <script src="js/utils.js?v=5.5.11"></script>
    <script src="js/config.js?v=5.5.11"></script>
    <script src="js/connection.js?v=5.5.11"></script>
    <script>
    (function() {
        const token = sessionStorage.getItem('genie_token');
        const _sv = localStorage.getItem('mg_serverUrl');
        const base = (_sv ? JSON.parse(_sv) : 'http://localhost:8080') + '/api/v1';
        const hdr = { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };
        let selectedFormat = 'csv';

        async function loadExport() {
            try {
                const [fRes, tRes] = await Promise.all([
                    fetch(base + '/export/formats', { headers: hdr }),
                    fetch(base + '/export/csv/templates', { headers: hdr })
                ]);
                const formats = await fRes.json();
                const templates = await tRes.json();
                renderFormats(formats);
                renderTemplates(templates);
            } catch(e) { renderDemo(); }
        }

        function renderFormats(data) {
            const formats = data.formats || ['CSV', 'JSON', 'PDF', 'XML', 'XLSX'];
            let html = '';
            formats.forEach(f => {
                const name = typeof f === 'string' ? f : f.name;
                html += '<div class="metric-row"><span class="metric-label">' + name + '</span><span class="metric-value positive">Available</span></div>';
            });
            document.getElementById('availFormats').innerHTML = html;
        }

        function renderTemplates(data) {
            const templates = data.templates || [
                { name: 'Positions Report', columns: 'Symbol, Qty, Price, Value, P&L' },
                { name: 'Tax Lots', columns: 'Symbol, Lot Date, Cost Basis, Current, Gain/Loss' },
                { name: 'Trade History', columns: 'Date, Symbol, Side, Qty, Price, Commission' },
                { name: 'Risk Summary', columns: 'Metric, Value, Limit, Status' }
            ];
            let html = '';
            templates.forEach(t => {
                html += '<div class="metric-row"><span class="metric-label">' + t.name + '<br><small style="color:#94a3b8">' + t.columns + '</small></span><span class="metric-value"><button class="btn-sm" onclick="useTemplate(\'' + t.name + '\')">Use</button></span></div>';
            });
            document.getElementById('csvTemplates').innerHTML = html;
        }

        function renderDemo() {
            renderFormats({});
            renderTemplates({});
            document.getElementById('exportHistory').innerHTML = '<div class="metric-row"><span class="metric-label">positions_2026-02-06.csv</span><span class="metric-value">42 KB</span></div><div class="metric-row"><span class="metric-label">risk_report_2026-02-05.pdf</span><span class="metric-value">128 KB</span></div><div class="metric-row"><span class="metric-label">tax_records_2026-01.json</span><span class="metric-value">67 KB</span></div>';
            document.getElementById('scheduledExports').innerHTML = '<div class="metric-row"><span class="metric-label">Daily Positions (CSV)</span><span class="metric-value positive">Active</span></div><div class="metric-row"><span class="metric-label">Weekly Risk Report (PDF)</span><span class="metric-value positive">Active</span></div><div class="metric-row"><span class="metric-label">Monthly Tax Summary (JSON)</span><span class="metric-value positive">Active</span></div>';
        }

        window.selectFormat = function(el, fmt) {
            selectedFormat = fmt;
            document.querySelectorAll('.format-opt').forEach(o => o.classList.remove('selected'));
            el.classList.add('selected');
        };

        window.useTemplate = function(name) {
            document.getElementById('exportStatus').innerHTML = '<div class="metric-row"><span class="metric-label">Template</span><span class="metric-value neutral">' + name + '</span></div><div class="metric-row"><span class="metric-label">Status</span><span class="metric-value positive">Ready to export</span></div>';
        };

        window.runExport = function() {
            const source = document.getElementById('exportSource').value;
            const from = document.getElementById('exportFrom').value;
            const to = document.getElementById('exportTo').value;
            document.getElementById('exportStatus').innerHTML = '<div class="metric-row"><span class="metric-label">Source</span><span class="metric-value">' + source + '</span></div><div class="metric-row"><span class="metric-label">Format</span><span class="metric-value">' + selectedFormat.toUpperCase() + '</span></div><div class="metric-row"><span class="metric-label">Range</span><span class="metric-value">' + from + ' to ' + to + '</span></div><div class="metric-row"><span class="metric-label">Status</span><span class="metric-value positive">Generating...</span></div>';
            fetch(base + '/export', { method: 'POST', headers: hdr, body: JSON.stringify({ source, format: selectedFormat, from, to }) })
            .then(r => r.json()).then(d => {
                document.getElementById('exportStatus').innerHTML += '<div class="metric-row"><span class="metric-label">File</span><span class="metric-value neutral">' + (d.filename||source+'_export.'+selectedFormat) + '</span></div><div class="metric-row"><span class="metric-label">Download</span><span class="metric-value"><a href="' + (d.download_url||'#') + '" style="color:#2563eb">Download</a></span></div>';
            }).catch(() => {
                document.getElementById('exportStatus').innerHTML += '<div class="metric-row"><span class="metric-label">Result</span><span class="metric-value positive">Export complete (demo)</span></div>';
            });
        };

        loadExport();
    })();
    </script>
</body>
</html>
