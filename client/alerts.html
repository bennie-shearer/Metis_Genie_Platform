<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/svg+xml" href="img/icon.svg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alerts - Metis Genie Platform v5.5.11</title>
    <link rel="stylesheet" href="css/main.css?v=5.5.11">
    <style>
        .alerts-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(360px,1fr));gap:1.25rem;padding:1.5rem}
        .al-card{background:var(--card-bg,#fff);border:1px solid var(--border,#e2e8f0);border-radius:12px;overflow:hidden}
        .al-card .card-head{display:flex;justify-content:space-between;align-items:center;padding:1rem 1.25rem;border-bottom:1px solid var(--border,#e2e8f0)}
        .al-card .card-head h3{margin:0;font-size:.95rem;font-weight:600}
        .al-card .card-body{padding:1.25rem}
        .metric-row{display:flex;justify-content:space-between;align-items:center;padding:.5rem 0;border-bottom:1px solid var(--border-light,#f1f5f9)}
        .metric-row:last-child{border-bottom:none}
        .metric-label{font-size:.85rem;color:var(--text-muted,#64748b)}
        .metric-value{font-size:.95rem;font-weight:600;font-variant-numeric:tabular-nums}
        .positive{color:#16a34a}.negative{color:#dc2626}.neutral{color:#2563eb}.warning{color:#f59e0b}
        .page-header{padding:1.5rem 1.5rem 0;display:flex;justify-content:space-between;align-items:center}
        .page-header h2{margin:0;font-size:1.4rem;font-weight:700}
        .badge-tag{display:inline-block;padding:2px 10px;border-radius:12px;font-size:.75rem;font-weight:600}
        .badge-tag.pass{background:#dcfce7;color:#166534}
        .back-link{display:inline-flex;align-items:center;gap:.375rem;color:var(--text-muted,#64748b);text-decoration:none;font-size:.85rem;padding:.5rem 0}
        .back-link:hover{color:var(--primary,#2563eb)}
        .back-link svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2}
        .alert-item{padding:.75rem;border-radius:8px;margin-bottom:.5rem;border-left:4px solid}
        .alert-item.critical{background:#fef2f2;border-color:#dc2626}
        .alert-item.warn{background:#fffbeb;border-color:#f59e0b}
        .alert-item.info{background:#eff6ff;border-color:#2563eb}
        .alert-item.success{background:#f0fdf4;border-color:#16a34a}
        .alert-title{font-weight:600;font-size:.85rem;margin-bottom:2px}
        .alert-detail{font-size:.8rem;color:var(--text-muted,#64748b)}
        .alert-time{font-size:.75rem;color:var(--text-muted,#94a3b8);margin-top:4px}
        .btn-sm{padding:4px 12px;border:1px solid var(--border,#e2e8f0);border-radius:6px;background:var(--card-bg,#fff);cursor:pointer;font-size:.8rem}
        .btn-sm:hover{background:var(--primary,#2563eb);color:#fff;border-color:var(--primary,#2563eb)}
        .create-form{display:grid;gap:.5rem}
        .create-form input,.create-form select{padding:6px 10px;border:1px solid var(--border,#e2e8f0);border-radius:6px;font-size:.85rem}
    </style>
</head>
<body>
    <div class="page-header">
        <div>
            <a href="index.html" class="back-link"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>Back to Dashboard</a>
            <h2>Alerts</h2>
        </div>
        <span class="badge-tag pass" id="statusBadge">Loading...</span>
    </div>
    <div class="alerts-grid" id="alertsGrid">
        <div class="al-card"><div class="card-head"><h3>Active Alerts</h3><button class="btn-sm" onclick="refreshAlerts()">Refresh</button></div><div class="card-body" id="activeAlerts"><span class="metric-label">Loading...</span></div></div>
        <div class="al-card"><div class="card-head"><h3>Alert Summary</h3></div><div class="card-body" id="alertSummary"><span class="metric-label">Loading...</span></div></div>
        <div class="al-card"><div class="card-head"><h3>Create Alert Rule</h3></div><div class="card-body" id="createAlert">
            <div class="create-form">
                <input type="text" id="alertSymbol" placeholder="Symbol (e.g. AAPL)">
                <select id="alertType"><option value="price_above">Price Above</option><option value="price_below">Price Below</option><option value="pct_change">% Change</option><option value="volume_spike">Volume Spike</option><option value="risk_breach">Risk Breach</option></select>
                <input type="number" id="alertThreshold" placeholder="Threshold value" step="0.01">
                <select id="alertChannel"><option value="email">Email</option><option value="sms">SMS</option><option value="webhook">Webhook</option><option value="in_app">In-App</option></select>
                <button class="btn-sm" onclick="createAlertRule()">Create Alert</button>
            </div>
        </div></div>
        <div class="al-card"><div class="card-head"><h3>Alert Rules</h3></div><div class="card-body" id="alertRules"><span class="metric-label">Loading...</span></div></div>
        <div class="al-card"><div class="card-head"><h3>Alert History</h3></div><div class="card-body" id="alertHistory"><span class="metric-label">Loading...</span></div></div>
        <div class="al-card"><div class="card-head"><h3>Notification Channels</h3></div><div class="card-body" id="notifChannels"><span class="metric-label">Loading...</span></div></div>
    </div>
    <script src="js/utils.js?v=5.5.11"></script>
    <script src="js/config.js?v=5.5.11"></script>
    <script src="js/connection.js?v=5.5.11"></script>
    <script>
    (function() {
        const token = sessionStorage.getItem('genie_token');
        const _sv = localStorage.getItem('mg_serverUrl');
        const base = (_sv ? JSON.parse(_sv) : 'http://localhost:8080') + '/api/v1';
        const hdr = { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };

        async function loadAlerts() {
            try {
                const res = await fetch(base + '/alerts', { headers: hdr });
                const data = await res.json();
                renderAlerts(data);
                document.getElementById('statusBadge').textContent = 'Connected';
            } catch(e) {
                document.getElementById('statusBadge').textContent = 'Demo Mode';
                renderDemo();
            }
        }

        function renderAlerts(data) {
            const alerts = data.alerts || data.active || [];
            let html = '';
            const demoAlerts = alerts.length ? alerts : [
                { severity: 'critical', title: 'VaR Limit Breach', detail: 'Portfolio VaR exceeds 2.5% threshold at 2.78%', time: '2 min ago' },
                { severity: 'warn', title: 'Position Concentration', detail: 'AAPL position exceeds 15% of portfolio (currently 17.2%)', time: '15 min ago' },
                { severity: 'info', title: 'Rebalance Suggestion', detail: 'Portfolio drift exceeds 3% target threshold', time: '1 hr ago' },
                { severity: 'success', title: 'Order Filled', detail: 'Buy 50 MSFT @ $425.30 - Filled', time: '2 hr ago' }
            ];
            demoAlerts.forEach(a => {
                const cls = a.severity === 'critical' ? 'critical' : a.severity === 'warn' || a.severity === 'warning' ? 'warn' : a.severity === 'success' ? 'success' : 'info';
                html += '<div class="alert-item ' + cls + '"><div class="alert-title">' + (a.title||a.message||'Alert') + '</div><div class="alert-detail">' + (a.detail||a.description||'') + '</div><div class="alert-time">' + (a.time||a.timestamp||'') + '</div></div>';
            });
            document.getElementById('activeAlerts').innerHTML = html;
        }

        function renderDemo() {
            renderAlerts({});
            document.getElementById('alertSummary').innerHTML = '<div class="metric-row"><span class="metric-label">Critical</span><span class="metric-value negative">1</span></div><div class="metric-row"><span class="metric-label">Warning</span><span class="metric-value warning">2</span></div><div class="metric-row"><span class="metric-label">Info</span><span class="metric-value neutral">5</span></div><div class="metric-row"><span class="metric-label">Resolved Today</span><span class="metric-value positive">8</span></div>';
            document.getElementById('alertRules').innerHTML = '<div class="metric-row"><span class="metric-label">AAPL Price > $200</span><span class="metric-value positive">Active</span></div><div class="metric-row"><span class="metric-label">Portfolio VaR > 2.5%</span><span class="metric-value positive">Active</span></div><div class="metric-row"><span class="metric-label">Daily P&L < -$5,000</span><span class="metric-value positive">Active</span></div><div class="metric-row"><span class="metric-label">Volume Spike > 3x avg</span><span class="metric-value neutral">Paused</span></div>';
            document.getElementById('alertHistory').innerHTML = '<div class="metric-row"><span class="metric-label">Last 24h</span><span class="metric-value">12 alerts</span></div><div class="metric-row"><span class="metric-label">Last 7d</span><span class="metric-value">47 alerts</span></div><div class="metric-row"><span class="metric-label">Last 30d</span><span class="metric-value">183 alerts</span></div><div class="metric-row"><span class="metric-label">Avg Response Time</span><span class="metric-value positive">3.2 min</span></div>';
            document.getElementById('notifChannels').innerHTML = '<div class="metric-row"><span class="metric-label">Email</span><span class="metric-value positive">Configured</span></div><div class="metric-row"><span class="metric-label">SMS</span><span class="metric-value neutral">Not Set</span></div><div class="metric-row"><span class="metric-label">Webhook</span><span class="metric-value positive">Configured</span></div><div class="metric-row"><span class="metric-label">In-App</span><span class="metric-value positive">Active</span></div>';
        }

        window.refreshAlerts = loadAlerts;
        window.createAlertRule = function() {
            const symbol = document.getElementById('alertSymbol').value;
            if (!symbol) return;
            const body = { symbol, type: document.getElementById('alertType').value, threshold: parseFloat(document.getElementById('alertThreshold').value), channel: document.getElementById('alertChannel').value };
            fetch(base + '/alerts', { method: 'POST', headers: hdr, body: JSON.stringify(body) }).catch(() => {});
            document.getElementById('alertSymbol').value = '';
            document.getElementById('alertThreshold').value = '';
            loadAlerts();
        };

        loadAlerts();
    })();
    </script>
</body>
</html>
