<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="parch" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8d8b8"/>
      <stop offset="100%" stop-color="#c8a878"/>
    </linearGradient>
    <linearGradient id="rod23" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#aa7700"/>
    </linearGradient>
  </defs>
  
  <rect width="512" height="512" rx="72" fill="#0c0818"/>
  
  <!-- Capital M behind scroll -->
  <text x="256" y="395" text-anchor="middle" fill="#ffd700" font-family="Georgia, serif" font-size="450" font-weight="700" opacity="0.25">M</text>

  <g transform="translate(256,235)">
    <!-- Scroll body (unrolled, open to all) -->
    <rect x="-100" y="-100" width="200" height="200" rx="4" fill="url(#parch)" opacity="0.85"/>
    
    <!-- Scroll roll at top -->
    <ellipse cx="0" cy="-105" rx="108" ry="12" fill="url(#parch)"/>
    <ellipse cx="0" cy="-105" rx="108" ry="10" fill="#d8c898"/>
    <!-- Golden rod visible at ends -->
    <ellipse cx="-110" cy="-105" rx="6" ry="14" fill="url(#rod23)"/>
    <ellipse cx="110" cy="-105" rx="6" ry="14" fill="url(#rod23)"/>
    <circle cx="-110" cy="-120" r="4" fill="#ffd700"/>
    <circle cx="110" cy="-120" r="4" fill="#ffd700"/>
    <circle cx="-110" cy="-90" r="4" fill="#ffd700"/>
    <circle cx="110" cy="-90" r="4" fill="#ffd700"/>
    
    <!-- Scroll roll at bottom -->
    <ellipse cx="0" cy="105" rx="108" ry="12" fill="url(#parch)"/>
    <ellipse cx="0" cy="105" rx="108" ry="10" fill="#d8c898"/>
    <ellipse cx="-110" cy="105" rx="6" ry="14" fill="url(#rod23)"/>
    <ellipse cx="110" cy="105" rx="6" ry="14" fill="url(#rod23)"/>
    <circle cx="-110" cy="120" r="4" fill="#ffd700"/>
    <circle cx="110" cy="120" r="4" fill="#ffd700"/>
    <circle cx="-110" cy="90" r="4" fill="#ffd700"/>
    <circle cx="110" cy="90" r="4" fill="#ffd700"/>
    
    <!-- Financial wisdom written on scroll (the open knowledge) -->
    <text x="-80" y="-75" fill="#3a2810" font-family="Georgia, serif" font-size="11" font-weight="600" opacity="0.7">// portfolio.hpp</text>
    <text x="-80" y="-55" fill="#5a4830" font-family="monospace" font-size="9" opacity="0.5">NAV = assets - liabilities</text>
    
    <text x="-80" y="-30" fill="#3a2810" font-family="Georgia, serif" font-size="11" font-weight="600" opacity="0.7">// risk.hpp</text>
    <text x="-80" y="-10" fill="#5a4830" font-family="monospace" font-size="9" opacity="0.5">VaR = P * z * sigma * sqrt(t)</text>
    
    <text x="-80" y="15" fill="#3a2810" font-family="Georgia, serif" font-size="11" font-weight="600" opacity="0.7">// trading.hpp</text>
    <text x="-80" y="35" fill="#5a4830" font-family="monospace" font-size="9" opacity="0.5">VWAP = sum(P*V) / sum(V)</text>
    
    <text x="-80" y="60" fill="#3a2810" font-family="Georgia, serif" font-size="11" font-weight="600" opacity="0.7">// analytics.hpp</text>
    <text x="-80" y="80" fill="#5a4830" font-family="monospace" font-size="9" opacity="0.5">Sharpe = (Rp - Rf) / sigma</text>
    
    <!-- Golden glow emanating from the open scroll -->
    <rect x="-105" y="-105" width="210" height="215" rx="6" fill="none" stroke="#ffd700" stroke-width="2" opacity="0.15"/>
    
    <!-- Sparkles rising from scroll (knowledge liberated) -->
    <circle cx="-50" cy="-130" r="2.5" fill="#ffd700" opacity="0.4"/>
    <circle cx="30" cy="-135" r="2" fill="#cc88ff" opacity="0.3"/>
    <circle cx="-10" cy="-145" r="2" fill="#ffd700" opacity="0.3"/>
    <circle cx="60" cy="-125" r="1.5" fill="#cc88ff" opacity="0.25"/>
    <circle cx="-70" cy="-125" r="1.5" fill="#ffd700" opacity="0.25"/>
  </g>
  
  <text x="256" y="448" text-anchor="middle" fill="#e0d0f0" font-family="system-ui, sans-serif" font-size="36" font-weight="700" letter-spacing="5">METIS GENIE</text>
  <text x="256" y="476" text-anchor="middle" fill="#6a5a80" font-family="system-ui, sans-serif" font-size="13" letter-spacing="4">PLATFORM</text>
</svg>
